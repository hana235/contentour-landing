<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta name="description" content="요청하신 페이지를 찾을 수 없습니다. 콘텐츄어 메인 페이지로 돌아가 주세요.">
    <title>페이지를 찾을 수 없습니다 - 콘텐츄어</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <!-- Preconnect: 폰트 핸드셰이크 사전 수행 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <!-- Web Fonts (design-tokens @import에서 이전 — 렌더 비차단) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/assets/pretendard.css">
    <link rel="stylesheet" href="design-tokens.css?v=20260526b">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Pretendard', 'Pretendard Variable', sans-serif;
            letter-spacing: -0.01em;
            background: #f0f5ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0d1b3e;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }
        .code {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1565c0, #4fc3f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        .title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 0.92rem;
            color: #4a5a75;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 700;
            text-decoration: none;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(21,101,192,0.3);
        }
    </style>
</head>
<body>
    <!-- Password Protection -->
    <div class="container">
        <div class="code">404</div>
        <h1 class="title">페이지를 찾을 수 없습니다</h1>
        <p class="desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>주소를 다시 확인해주세요.</p>
        <a href="index.html" class="btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
